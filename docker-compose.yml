services:
  db:
    image: postgres:16-alpine
    container_name: fittrack-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fittrack
    volumes:
      - fittrack_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fittrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fittrack_pg_data:
